<!DOCTYPE html>
<!--
  COMP 4610 GUI I - HW4 Part 1: Dynamic Multiplication Table
  Author: Alexi Montesinos
  Email: Alexi_Montesinos@student.uml.edu
  Description: Multiplication table generator that uses the jQuery Validation
               plugin for inline form validation. The table is only built when
               all four range inputs pass validation; no page reload occurs on
               error.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Multiplication Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Dynamic Multiplication Table</h1>
  </header>

  <main>
    <section class="form-section">
      <!-- novalidate disables browser-native validation so the plugin controls everything -->
      <form id="tableForm" novalidate>
        <fieldset>
          <legend>Please enter the table ranges</legend>

          <div class="form-group">
            <label for="minCol">Minimum Column Value</label>
            <input type="number" id="minCol" name="minCol" placeholder="-50 to 50">
          </div>

          <div class="form-group">
            <label for="maxCol">Maximum Column Value</label>
            <input type="number" id="maxCol" name="maxCol" placeholder="-50 to 50">
          </div>

          <div class="form-group">
            <label for="minRow">Minimum Row Value</label>
            <input type="number" id="minRow" name="minRow" placeholder="-50 to 50">
          </div>

          <div class="form-group">
            <label for="maxRow">Maximum Row Value</label>
            <input type="number" id="maxRow" name="maxRow" placeholder="-50 to 50">
          </div>

          <button type="submit" id="generateBtn">Generate Table</button>
        </fieldset>
      </form>
    </section>

    <section id="table-section" class="table-section hidden">
      <div id="table-container" class="table-container"></div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
